<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.S Video Hub</title>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #ffffff; padding-bottom: 50px; }
        
        header { 
            background-color: #1a1a1a; padding: 20px; text-align: center; 
            border-bottom: 2px solid #e74c3c; margin-bottom: 10px; position: relative;
        }

        #loginBtn {
            position: absolute; top: 20px; right: 20px; background: #333;
            color: #fff; border: 1px solid #444; padding: 5px 10px;
            cursor: pointer; border-radius: 5px; font-size: 12px;
        }

        #adminPanel {
            display: none; max-width: 500px; margin: 10px auto;
            background: #1a1a1a; padding: 20px; border-radius: 12px; border: 2px solid #e74c3c;
        }

        input, textarea, button {
            width: 100%; padding: 12px; margin-bottom: 12px;
            border-radius: 8px; border: 1px solid #444; background: #262626; color: white;
        }

        /* GRID 2 BARIS */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; padding: 10px; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: #1a1a1a; border-radius: 8px; overflow: hidden;
            border: 1px solid #333; cursor: pointer; transition: 0.3s;
        }

        .card:hover { transform: scale(1.02); }

        /* Thumbnail Pengganti Video di Grid */
        .thumb-container {
            width: 100%; height: 120px; background: #000;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .play-icon { font-size: 40px; color: rgba(231, 76, 60, 0.8); }

        .info { padding: 10px; }
        .info h3 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* MODAL / POPUP VIDEO */
        #videoModal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }

        #videoContainer { width: 95%; max-width: 800px; }
        #videoContainer video, #videoContainer iframe { width: 100%; height: 250px; border-radius: 10px; }

        .close-modal {
            margin-top: 20px; background: #e74c3c; color: white;
            border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: auto;
        }

        .btn-hapus {
            background: #222; color: #ff4d4d; border: 1px solid #444;
            padding: 5px; font-size: 11px; margin-top: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>N.S Video Hub</h1>
        <button id="loginBtn">Login Admin</button>
    </header>

    <div id="adminPanel">
        <input type="text" id="title" placeholder="Judul Video">
        <input type="text" id="url" placeholder="Link YouTube/MP4...">
        <div style="text-align:center; margin-bottom:10px;">
            <input type="hidden" role="uploadcare-uploader" id="uploaderGaleri" 
                   data-public-key="b81ad4cf9a7a064334aa" data-tabs="file" data-input-accept-types="video/*" />
        </div>
        <textarea id="desc" placeholder="Deskripsi..."></textarea>
        <button id="btnSimpan" style="background:#e74c3c; font-weight:bold; border:none;">Simpan</button>
        <button onclick="logout()" style="background:#333; border:none;">Keluar</button>
    </div>

    <main class="grid" id="videoGrid"></main>

    <div id="videoModal">
        <div id="videoContainer"></div>
        <button class="close-modal" onclick="closeModal()">Tutup Video</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7Pd_cd0VgHQOUEDU26VaFQQFbI4Ifo0c",
            authDomain: "video-3e4ef.firebaseapp.com",
            projectId: "video-3e4ef",
            storageBucket: "video-3e4ef.appspot.com",
            messagingSenderId: "138417343253",
            appId: "1:138417343253:web:42004454f412ff73f6371c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const videoCol = collection(db, "videos");
        let isAdmin = false;

        // LOGIN SYSTEM
        document.getElementById('loginBtn').onclick = () => {
            if (prompt("PIN Admin:") === "1234") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                renderVideos();
            }
        };

        window.logout = () => { isAdmin = false; location.reload(); };

        // UPLOADCARE
        const widget = uploadcare.Widget('#uploaderGaleri');
        let fileUrl = "";
        widget.onUploadComplete(info => { fileUrl = info.cdnUrl; });

        // RENDER GRID
        function renderVideos() {
            onSnapshot(query(videoCol, orderBy("createdAt", "desc")), (snap) => {
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = '';
                snap.forEach((dSnap) => {
                    const data = dSnap.data();
                    const id = dSnap.id;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openModal(data.url);
                    
                    card.innerHTML = `
                        <div class="thumb-container">
                            <div class="play-icon">▶</div>
                        </div>
                        <div class="info">
                            <h3>${data.title}</h3>
                            ${isAdmin ? `<button class="btn-hapus" onclick="event.stopPropagation(); hapusData('${id}')">Hapus</button>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        // FUNGSI BUKA MODAL
        window.openModal = (url) => {
            const container = document.getElementById('videoContainer');
            const modal = document.getElementById('videoModal');
            let html = '';

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const ytId = url.split('v=')[1] || url.split('/').pop().split('?')[0];
                html = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                html = `<video src="${url}" controls autoplay playsinline></video>`;
            }

            container.innerHTML = html;
            modal.style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('videoContainer').innerHTML = '';
        };

        // SIMPAN DATA
        document.getElementById('btnSimpan').onclick = async () => {
            const t = document.getElementById('title').value;
            const u = fileUrl || document.getElementById('url').value;
            if (t && u) {
                await addDoc(videoCol, { title: t, url: u, createdAt: new Date() });
                alert("Tersimpan!");
                location.reload();
            }
        };

        window.hapusData = async (id) => {
            if (confirm("Hapus?")) await deleteDoc(doc(db, "videos", id));
        };

        renderVideos();
    </script>
</body>
</html>
