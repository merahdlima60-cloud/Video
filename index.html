<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.S Video Hub - Admin System</title>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #ffffff; padding-bottom: 50px; }
        
        header { 
            background-color: #1a1a1a; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 2px solid #e74c3c; 
            margin-bottom: 20px;
            position: relative;
        }

        #loginBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 12px;
        }

        #adminPanel {
            display: none; 
            max-width: 500px;
            margin: 0 auto 30px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e74c3c;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #262626;
            color: white;
            outline: none;
        }

        .pilihan-upload { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .pilihan-upload span { font-size: 0.9rem; color: #aaa; text-align: center; }

        button#btnSimpan {
            background-color: #e74c3c;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .card iframe, .card video {
            width: 100%;
            height: 200px;
            background: #000;
            border: none;
        }

        .info { padding: 15px; }
        .info h3 { margin-bottom: 5px; font-size: 1.1rem; }
        .info p { font-size: 0.85rem; color: #aaa; margin-bottom: 10px; }

        .btn-hapus {
            display: none;
            background: #333;
            color: #ff4d4d;
            border: 1px solid #444;
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            width: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>N.S Video Hub</h1>
        <p>Koleksi Video Personal</p>
        <button id="loginBtn">Login Admin</button>
    </header>

    <div id="adminPanel">
        <h3 style="margin-bottom: 15px; color: #e74c3c;">Panel Admin</h3>
        <input type="text" id="title" placeholder="Judul Video">
        <input type="text" id="url" placeholder="Tempel Link YouTube/MP4...">
        
        <div class="pilihan-upload">
            <span>— ATAU UPLOAD VIDEO —</span>
            <input type="hidden" role="uploadcare-uploader" id="uploaderGaleri" 
                   data-public-key="YOUR_PUBLIC_KEY_DISINI" 
                   data-tabs="file" 
                   data-input-accept-types="video/*" />
        </div>

        <textarea id="desc" placeholder="Deskripsi video..."></textarea>
        <button id="btnSimpan">Simpan ke Koleksi</button>
        <button onclick="logout()" style="background: #333; border: 1px solid #555;">Keluar (Logout)</button>
    </div>

    <main class="grid" id="videoGrid"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7Pd_cd0VgHQOUEDU26VaFQQFbI4Ifo0c",
            authDomain: "video-3e4ef.firebaseapp.com",
            projectId: "video-3e4ef",
            storageBucket: "video-3e4ef.appspot.com",
            messagingSenderId: "138417343253",
            appId: "1:138417343253:web:42004454f412ff73f6371c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const videoCol = collection(db, "videos");

        const PIN_ADMIN = "1234"; 
        let isAdmin = false;

        document.getElementById('loginBtn').onclick = () => {
            const inputPin = prompt("Masukkan PIN Admin:");
            if (inputPin === PIN_ADMIN) {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                renderVideos();
            } else {
                alert("PIN Salah!");
            }
        };

        window.logout = () => {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'block';
            renderVideos();
        };

        const widget = uploadcare.Widget('#uploaderGaleri');
        let fileGaleriUrl = "";
        widget.onUploadComplete(info => { 
            fileGaleriUrl = info.cdnUrl; 
            alert("Video siap disimpan!");
        });

        function renderVideos() {
            onSnapshot(query(videoCol, orderBy("createdAt", "desc")), (snap) => {
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = '';
                snap.forEach((documentSnap) => {
                    const data = documentSnap.data();
                    const id = documentSnap.id;
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let mediaHtml;
                    if (data.url.includes('youtube.com') || data.url.includes('youtu.be')) {
                        const ytId = data.url.split('v=')[1] || data.url.split('/').pop();
                        mediaHtml = `<iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe>`;
                    } else {
                        mediaHtml = `<video src="${data.url}" controls></video>`;
                    }

                    card.innerHTML = `
                        ${mediaHtml}
                        <div class="info">
                            <h3>${data.title}</h3>
                            <p>${data.desc}</p>
                            <button class="btn-hapus" style="display: ${isAdmin ? 'block' : 'none'}" onclick="hapusData('${id}')">🗑️ Hapus</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        document.getElementById('btnSimpan').onclick = async () => {
            const t = document.getElementById('title').value;
            const u = fileGaleriUrl || document.getElementById('url').value;
            const d = document.getElementById('desc').value;

            if (t && u) {
                await addDoc(videoCol, { title: t, url: u, desc: d, createdAt: new Date() });
                alert("Berhasil disimpan!");
                location.reload(); 
            } else {
                alert("Isi Judul dan Link/Upload Video!");
            }
        };

        window.hapusData = async (id) => {
            if (confirm("Hapus video secara permanen?")) {
                await deleteDoc(doc(db, "videos", id));
            }
        };

        renderVideos();
    </script>
</body>
</html>
